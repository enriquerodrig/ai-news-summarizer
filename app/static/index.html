<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        
        .summaries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .category-Technology { background: #667eea; color: white; }
        .category-Business { background: #f093fb; color: white; }
        .category-Science { background: #4facfe; color: white; }
        .category-General { background: #43e97b; color: white; }
        
        .article-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .metadata {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .metadata span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .summary-text {
            color: #4a5568;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .summaries-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 AI News Summarizer</h1>
            <p class="subtitle">Stay informed with AI-powered news summaries</p>
        </header>
        
        <div id="last-update" class="last-update"></div>
        <div id="loading" class="loading">Loading latest news...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="summaries" class="summaries-grid"></div>
    </div>
    
    <script>
        async function loadSummaries() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const summariesEl = document.getElementById('summaries');
            const lastUpdateEl = document.getElementById('last-update');
            
            try {
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';
                
                const response = await fetch('/api/summaries');
                
                if (!response.ok) {
                    throw new Error('Failed to load summaries');
                }
                
                const summaries = await response.json();
                
                loadingEl.style.display = 'none';
                
                if (summaries.length === 0) {
                    summariesEl.innerHTML = '<p style="text-align: center; color: white;">No news available at the moment.</p>';
                    return;
                }
                
                // Display last update time
                if (summaries[0].last_updated) {
                    const lastUpdate = new Date(summaries[0].last_updated);
                    lastUpdateEl.textContent = `Last updated: ${lastUpdate.toLocaleString()}`;
                }
                
                // Render summaries
                summariesEl.innerHTML = summaries.map(summary => `
                    <div class="summary-card">
                        <span class="category-badge category-${summary.category}">${summary.category}</span>
                        <h2 class="article-title">${escapeHtml(summary.title)}</h2>
                        <div class="metadata">
                            <span>📰 ${escapeHtml(summary.source)}</span>
                            <span>🕒 ${escapeHtml(summary.published)}</span>
                        </div>
                        <p class="summary-text">${escapeHtml(summary.summary)}</p>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading summaries:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = 'Unable to load news summaries. Please try again in a moment.';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load summaries on page load
        loadSummaries();
        
        // Refresh every 5 minutes
        setInterval(loadSummaries, 5 * 60 * 1000);
    </script>
</body>
</html>
